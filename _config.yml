# Feature List                            Edit, add or remove features to be presented.
features                                  :

  - title                                 : Unlimited Countdowns
    description                           : Create unlimited countdowns that count down to future dates or count up from past milestones
    
  - title                                 : Widgets
    description                           : See countdowns right on your Home Screen or Lock Screen

  - title                                 : Customizable Units
    description                           : Show years, months, weeks, days, hours, minutes, seconds, or any mix that fits the event

  - title                                 : Recurring Events
    description                           : Build simple repeats or advanced recurring schedules for dates that keep coming back

  - title                                 : Event Import
    description                           : Import dates from Calendar, Contacts, and Reminders
  
  - title                                 : iCloud Sync
    description                           : Sync countdowns and lists across your devices

  - title                                 : Notifications
    description                           : Choose when to be reminded before each countdown

  - title                                 : Lists
    description                           : Organize countdowns into custom lists

  - title                                 : Archive
    description                           : Keep and view past countdowns

  - title                                 : Siri Shortcuts
    description                           : Use Shortcuts to check countdowns with your voice

  - title                                 : Apple Watch
    description                           : View countdowns on Apple Watch with complications

  - title                                 : Localized
    description                           : Available in 20+ languages


